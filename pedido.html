<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Estado de tu pedido — La Maison Sucrée</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: { extend: { fontFamily: { sans: ['Inter','sans-serif'] } } },
    };
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />

  <!-- Estilos compartidos -->
  <link rel="stylesheet" href="styles.css" />

  <!-- AnimeJS -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/animejs/3.2.2/anime.min.js"></script>
</head>
<body class="min-h-screen text-gray-900 antialiased" data-page="pedido">

  <!-- Header -->
  <header class="bg-white border-b border-amber-100 sticky top-0 z-10">
    <div class="max-w-2xl mx-auto px-4 h-14 flex items-center justify-between">
      <a href="index.html" class="flex items-center gap-2 hover:opacity-80 transition-opacity">
        <span class="text-xl">🥐</span>
        <span class="font-display font-semibold text-base text-gray-900">La Maison Sucrée</span>
      </a>
      <a href="index.html" class="text-sm text-amber-600 hover:text-amber-700 flex items-center gap-1 transition-colors">
        <span class="material-symbols-outlined" style="font-size:16px">storefront</span>
        Ver tienda
      </a>
    </div>
  </header>

  <main class="max-w-2xl mx-auto px-4 py-12">

    <!-- Título -->
    <div class="text-center mb-10">
      <span class="material-symbols-outlined text-amber-500 mb-3 block" style="font-size:48px">package_2</span>
      <h1 class="font-display text-3xl font-semibold text-gray-900 mb-2">Estado de tu pedido</h1>
      <p class="text-gray-500 text-sm">Ingresa tu correo o número de recibo para consultar</p>
    </div>

    <!-- Formulario de búsqueda -->
    <div class="bg-white rounded-2xl border border-gray-100 shadow-sm p-6 mb-6">
      <form id="form-buscar" class="space-y-4">
        <div>
          <label class="block text-xs font-medium text-gray-700 mb-1.5">Número de recibo</label>
          <div class="relative">
            <span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-gray-400" style="font-size:18px">receipt</span>
            <input
              id="input-recibo"
              type="text"
              placeholder="PS-2024-00001"
              maxlength="20"
              class="w-full pl-10 pr-4 py-2.5 border border-gray-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-amber-300 uppercase"
              oninput="this.value=this.value.toUpperCase()"
            />
          </div>
        </div>

        <div class="flex items-center gap-3">
          <div class="flex-1 h-px bg-gray-200"></div>
          <span class="text-xs text-gray-400 font-medium">O</span>
          <div class="flex-1 h-px bg-gray-200"></div>
        </div>

        <div>
          <label class="block text-xs font-medium text-gray-700 mb-1.5">Correo electrónico</label>
          <div class="relative">
            <span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-gray-400" style="font-size:18px">mail</span>
            <input
              id="input-email"
              type="email"
              placeholder="tu@correo.com"
              class="w-full pl-10 pr-4 py-2.5 border border-gray-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-amber-300"
            />
          </div>
          <p class="text-xs text-gray-400 mt-1">Muestra todos tus pedidos recientes</p>
        </div>

        <button
          type="submit"
          id="btn-buscar"
          class="w-full bg-gray-900 hover:bg-amber-700 text-white font-semibold py-3 rounded-xl transition-colors text-sm"
        >
          Consultar estado
        </button>
      </form>
    </div>

    <!-- Resultado -->
    <div id="resultado" class="space-y-4"></div>
  </main>

  <!-- Footer mínimo -->
  <footer class="text-center py-8 text-xs text-gray-400">
    <a href="index.html" class="hover:text-amber-600 transition-colors">Volver a la tienda</a>
    <span class="mx-3">·</span>
    <a href="https://wa.me/573001234567" target="_blank" class="hover:text-amber-600 transition-colors">WhatsApp</a>
  </footer>

  <!-- Scripts -->
  <script src="supabase-config.js"></script>
  <script src="animations.js"></script>
  <script>
    const ESTADOS_CONFIG = {
      pendiente:   { color: 'bg-yellow-100 text-yellow-700 border-yellow-200', icono: 'schedule',        label: 'Pendiente',   desc: 'Tu pedido fue recibido y está pendiente de confirmación.' },
      pagado:      { color: 'bg-blue-100 text-blue-700 border-blue-200',       icono: 'paid',            label: 'Pagado',      desc: 'El abono fue recibido. ¡Gracias!' },
      preparando:  { color: 'bg-purple-100 text-purple-700 border-purple-200', icono: 'bakery_dining',   label: 'Preparando',  desc: 'Estamos elaborando tu pedido con mucho amor.' },
      enviado:     { color: 'bg-indigo-100 text-indigo-700 border-indigo-200', icono: 'local_shipping',  label: 'En camino',   desc: 'Tu pedido está en camino hacia ti.' },
      completado:  { color: 'bg-green-100 text-green-700 border-green-200',    icono: 'check_circle',    label: 'Completado',  desc: '¡Pedido entregado! Esperamos que lo disfrutes.' },
      cancelado:   { color: 'bg-red-100 text-red-700 border-red-200',          icono: 'cancel',          label: 'Cancelado',   desc: 'El pedido fue cancelado. Contáctanos si tienes dudas.' },
    };

    const PROGRESO = ['pendiente','pagado','preparando','enviado','completado'];

    document.getElementById('form-buscar').addEventListener('submit', async (e) => {
      e.preventDefault();
      const recibo = document.getElementById('input-recibo').value.trim();
      const email  = document.getElementById('input-email').value.trim();

      if (!recibo && !email) {
        mostrarError('Ingresa tu número de recibo o correo electrónico.');
        return;
      }

      const btn = document.getElementById('btn-buscar');
      btn.disabled = true;
      btn.textContent = 'Buscando...';
      document.getElementById('resultado').innerHTML = '';

      try {
        const params = new URLSearchParams();
        if (recibo) params.set('recibo', recibo);
        if (email)  params.set('email', email);

        const res  = await fetch(`${WORKER_URL}/api/pedido/estado?${params}`);
        const data = await res.json();

        if (!res.ok) {
          mostrarError(data.error || 'No se encontraron pedidos con esos datos.');
          return;
        }

        renderResultados(Array.isArray(data) ? data : [data]);
      } catch (err) {
        mostrarError('Error de conexión. Verifica tu internet e intenta de nuevo.');
      } finally {
        btn.disabled = false;
        btn.textContent = 'Consultar estado';
      }
    });

    function renderResultados(pedidos) {
      const cont = document.getElementById('resultado');
      if (!pedidos.length) {
        mostrarError('No se encontraron pedidos.');
        return;
      }

      cont.innerHTML = pedidos.map(p => {
        const cfg        = ESTADOS_CONFIG[p.estado] || ESTADOS_CONFIG.pendiente;
        const historial  = Array.isArray(p.historial_estados) ? p.historial_estados : [];
        const items      = Array.isArray(p.items) ? p.items : [];
        const pasoActual = PROGRESO.indexOf(p.estado);

        return `
          <div class="bg-white rounded-2xl border border-gray-100 shadow-sm overflow-hidden">

            <!-- Header del pedido -->
            <div class="px-6 py-5 border-b border-gray-100">
              <div class="flex items-start justify-between gap-4 flex-wrap">
                <div>
                  <p class="text-xs text-gray-400 mb-1">Número de recibo</p>
                  <p class="font-mono font-bold text-lg text-gray-900">${esc(p.numero_recibo)}</p>
                </div>
                <span class="inline-flex items-center gap-1.5 px-3 py-1.5 rounded-full text-sm font-medium border ${cfg.color}">
                  <span class="material-symbols-outlined" style="font-size:16px">${cfg.icono}</span>
                  ${cfg.label}
                </span>
              </div>
              <p class="text-xs text-gray-500 mt-2">${cfg.desc}</p>
            </div>

            <!-- Barra de progreso -->
            ${p.estado !== 'cancelado' ? `
            <div class="px-6 py-4 bg-gray-50 border-b border-gray-100">
              <div class="flex items-center justify-between">
                ${PROGRESO.map((est, i) => {
                  const activo   = i <= pasoActual;
                  const isCurrent = i === pasoActual;
                  return `
                    <div class="flex flex-col items-center gap-1 flex-1 ${i < PROGRESO.length - 1 ? 'relative' : ''}">
                      ${i < PROGRESO.length - 1 ? `
                        <div class="absolute left-1/2 top-3 w-full h-0.5 ${i < pasoActual ? 'bg-amber-400' : 'bg-gray-200'}"></div>
                      ` : ''}
                      <div class="w-6 h-6 rounded-full flex items-center justify-center z-10 ${activo ? 'bg-amber-500 text-white' : 'bg-gray-200 text-gray-400'} ${isCurrent ? 'ring-2 ring-amber-200 ring-offset-1' : ''}">
                        <span class="material-symbols-outlined" style="font-size:13px">${ESTADOS_CONFIG[est].icono}</span>
                      </div>
                      <span class="text-[10px] text-center font-medium ${activo ? 'text-amber-700' : 'text-gray-400'} hidden sm:block">${ESTADOS_CONFIG[est].label}</span>
                    </div>
                  `;
                }).join('')}
              </div>
            </div>
            ` : ''}

            <!-- Detalles -->
            <div class="px-6 py-5 space-y-4">

              <!-- Info del pedido -->
              <div class="grid grid-cols-2 gap-4 text-sm">
                <div>
                  <p class="text-xs text-gray-400 mb-0.5">Fecha del pedido</p>
                  <p class="font-medium">${formatFecha(p.created_at)}</p>
                </div>
                ${p.fecha_entrega ? `
                <div>
                  <p class="text-xs text-gray-400 mb-0.5">Fecha de entrega</p>
                  <p class="font-medium text-amber-700">${formatFechaSimple(p.fecha_entrega)}</p>
                </div>
                ` : ''}
                <div>
                  <p class="text-xs text-gray-400 mb-0.5">Total</p>
                  <p class="font-semibold text-gray-900">${formatPeso(p.total)}</p>
                </div>
                <div>
                  <p class="text-xs text-gray-400 mb-0.5">Abono (50%)</p>
                  <p class="font-semibold ${p.abono_confirmado ? 'text-green-600' : 'text-amber-600'}">
                    ${formatPeso(p.monto_abono)}
                    ${p.abono_confirmado
                      ? '<span class="text-xs font-normal"> ✓ Recibido</span>'
                      : '<span class="text-xs font-normal"> — Pendiente</span>'}
                  </p>
                </div>
              </div>

              <!-- Items -->
              <div>
                <p class="text-xs font-medium text-gray-500 uppercase tracking-wide mb-2">Items</p>
                <div class="space-y-1.5">
                  ${items.map(i => `
                    <div class="flex justify-between text-sm">
                      <span class="text-gray-700">${esc(i.nombre)} <span class="text-gray-400">×${i.cantidad}</span></span>
                      <span class="font-medium text-gray-900">${formatPeso(i.precio * i.cantidad)}</span>
                    </div>
                  `).join('')}
                </div>
              </div>

              <!-- Línea de tiempo de estados -->
              ${historial.length > 1 ? `
              <div>
                <p class="text-xs font-medium text-gray-500 uppercase tracking-wide mb-3">Historial</p>
                <div class="space-y-3">
                  ${[...historial].reverse().map((h, i) => {
                    const hcfg = ESTADOS_CONFIG[h.estado] || ESTADOS_CONFIG.pendiente;
                    return `
                      <div class="relative timeline-item flex gap-3 pl-0">
                        <div class="w-6 h-6 rounded-full flex-shrink-0 flex items-center justify-center ${i === 0 ? 'bg-amber-500' : 'bg-gray-100'}">
                          <span class="material-symbols-outlined ${i === 0 ? 'text-white' : 'text-gray-400'}" style="font-size:13px">${hcfg.icono}</span>
                        </div>
                        <div>
                          <p class="text-sm font-medium text-gray-800">${hcfg.label}</p>
                          <p class="text-xs text-gray-400">${formatFecha(h.fecha)}</p>
                          ${h.nota ? `<p class="text-xs text-gray-600 mt-0.5 italic">"${esc(h.nota)}"</p>` : ''}
                        </div>
                      </div>
                    `;
                  }).join('')}
                </div>
              </div>
              ` : ''}

              <!-- CTA WhatsApp -->
              <a href="https://wa.me/573001234567?text=Hola!%20Quiero%20consultar%20mi%20pedido%20${esc(p.numero_recibo)}"
                 target="_blank"
                 class="flex items-center justify-center gap-2 w-full bg-[#25D366] hover:bg-[#1ebe5a] text-white font-semibold py-2.5 rounded-xl transition-colors text-sm">
                <svg viewBox="0 0 24 24" class="w-4 h-4 fill-current"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
                Consultar por WhatsApp
              </a>
            </div>
          </div>
        `;
      }).join('');
    }

    function mostrarError(msg) {
      document.getElementById('resultado').innerHTML = `
        <div class="bg-red-50 border border-red-200 rounded-2xl p-6 text-center">
          <span class="material-symbols-outlined text-red-400 block mb-2" style="font-size:36px">search_off</span>
          <p class="text-red-700 font-medium text-sm">${esc(msg)}</p>
          <p class="text-red-500 text-xs mt-1">Verifica los datos o contáctanos por WhatsApp</p>
        </div>
      `;
    }

    function esc(s) {
      if (!s) return '';
      return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    function formatFecha(iso) {
      if (!iso) return '';
      return new Intl.DateTimeFormat('es-CO', {
        day:'2-digit', month:'short', year:'numeric', hour:'2-digit', minute:'2-digit'
      }).format(new Date(iso));
    }

    function formatFechaSimple(str) {
      if (!str) return '';
      const [y,m,d] = str.split('-');
      return `${d}/${m}/${y}`;
    }

    function formatPeso(n) {
      return new Intl.NumberFormat('es-CO', {
        style:'currency', currency:'COP', minimumFractionDigits:0
      }).format(n || 0);
    }

    // Pre-llenar desde URL (?recibo=PS-2024-00001)
    const params = new URLSearchParams(location.search);
    if (params.get('recibo')) {
      document.getElementById('input-recibo').value = params.get('recibo').toUpperCase();
      document.getElementById('form-buscar').requestSubmit();
    }
  </script>
</body>
</html>
